name: myapp
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Theming
  google_fonts: ^6.2.1
  
  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.0

  # Local Storage & Database
  sqflite: ^2.3.3+1

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.8
  url_launcher: ^6.3.2
  path: ^1.9.1
  timezone: ^0.10.1
  flutter_local_notifications: ^20.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  
  # Code Generation
  go_router_builder: ^2.7.0
  build_runner: ^2.4.11

  # Testing
  mockito: ^5.4.4

flutter:
  uses-material-design: true
